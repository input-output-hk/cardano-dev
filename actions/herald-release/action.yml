name: Herald Release
description: >
  Batch changelog fragments for a package, create a release commit,
  open a pull request on a release branch, and add a release changelog fragment
  for the next cycle. The tag is created manually during signing.

inputs:
  package:
    description: Package name to release (must match a project in .herald.yml).
    required: true
  version:
    description: >
      Explicit version (A.B.C.D). If omitted, auto-computed from changelog
      fragments and the current .cabal version.
    required: false
    default: ''
  config:
    description: Path to the herald config file, relative to the repository root.
    required: false
    default: .herald.yml
  herald-ref:
    description: Flake reference for the cardano-dev repository containing herald.
    required: false
    default: github:input-output-hk/cardano-dev/herald-0.1.1.0
  base-branch:
    description: >
      Branch to target for the release PR. If omitted, auto-detected from the
      repository's default branch.
    required: false
    default: ''
  chap-instructions:
    description: >
      Include CHaP PR instructions in the release PR body.
      Only applies to projects with a cabal-file in the herald config.
    required: false
    default: 'false'

outputs:
  pr-url:
    description: URL of the release pull request.
    value: ${{ steps.pr.outputs.url }}
  pr-number:
    description: Number of the release pull request.
    value: ${{ steps.pr.outputs.number }}
  version:
    description: The released version (computed or explicit).
    value: ${{ steps.version.outputs.value }}
  tag:
    description: The git tag name for the release (created during signing, not by this action).
    value: ${{ steps.version.outputs.value && format('{0}-{1}', inputs.package, steps.version.outputs.value) }}

runs:
  using: composite
  steps:
    - name: Detect base branch
      id: default-branch
      shell: bash
      run: |
        DEFAULT="${{ inputs.base-branch }}"
        if [ -z "$DEFAULT" ]; then
          DEFAULT=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null \
            | sed 's|refs/remotes/origin/||') || true
        fi
        if [ -z "$DEFAULT" ]; then
          DEFAULT=$(git remote show origin 2>/dev/null \
            | grep 'HEAD branch' | awk '{print $NF}') || true
        fi
        if [ -z "$DEFAULT" ]; then
          echo "::error::Could not detect base branch"
          exit 1
        fi
        echo "name=$DEFAULT" >> "$GITHUB_OUTPUT"

    - name: Configure git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Fetch herald
      id: herald
      shell: bash
      run: |
        echo "::group::Fetching herald"
        HERALD="$(nix build --accept-flake-config "${{ inputs.herald-ref }}#herald" --no-link --print-out-paths)/bin/herald"
        echo "::endgroup::"
        echo "bin=$HERALD" >> "$GITHUB_OUTPUT"

    - name: Compute version
      id: version
      shell: bash
      run: |
        PACKAGE="${{ inputs.package }}"
        HERALD="${{ steps.herald.outputs.bin }}"
        CONFIG="-c ${{ inputs.config }}"

        if [ -n "${{ inputs.version }}" ]; then
          echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          if ! VERSION=$($HERALD $CONFIG next "$PACKAGE"); then
            echo "::error::herald next failed for $PACKAGE, see log above"
            exit 1
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not compute next version for $PACKAGE (empty output)."
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
        fi

    - name: Create release branch
      shell: bash
      run: |
        BRANCH="release/${{ inputs.package }}-${{ steps.version.outputs.value }}"
        git checkout -B "$BRANCH" "${{ steps.default-branch.outputs.name }}"
        echo "RELEASE_BRANCH=$BRANCH" >> "$GITHUB_ENV"
        echo "RELEASE_TAG=${{ inputs.package }}-${{ steps.version.outputs.value }}" >> "$GITHUB_ENV"

    - name: Batch changelog fragments
      shell: bash
      run: |
        HERALD="${{ steps.herald.outputs.bin }}"
        CONFIG="-c ${{ inputs.config }}"
        VERSION_ARG=""
        if [ -n "${{ inputs.version }}" ]; then
          VERSION_ARG="--version ${{ inputs.version }}"
        fi

        $HERALD $CONFIG batch "${{ inputs.package }}" --commit $VERSION_ARG

    - name: Push release branch
      shell: bash
      run: |
        git push -q --force -u origin "$RELEASE_BRANCH"

    - name: Create or reuse pull request
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PACKAGE="${{ inputs.package }}"
        VERSION="${{ steps.version.outputs.value }}"
        DEFAULT_BRANCH="${{ steps.default-branch.outputs.name }}"

        EXISTING=$(gh pr list \
          --head "$RELEASE_BRANCH" \
          --state open \
          --json number,url \
          --jq '.[0] // empty' 2>/dev/null) || true

        if [ -n "$EXISTING" ]; then
          PR_URL=$(echo "$EXISTING" | jq -r '.url')
          PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
          echo "::notice::Reusing existing release PR #$PR_NUMBER"
        else
          PR_URL=$(gh pr create \
            --title "Release $PACKAGE $VERSION" \
            --base "$DEFAULT_BRANCH" \
            --head "$RELEASE_BRANCH" \
            --body "Release in progress - PR body will be updated shortly.")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
        fi

        echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
        echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

    - name: Add release changelog fragment
      shell: bash
      run: |
        HERALD="${{ steps.herald.outputs.bin }}"
        CONFIG="-c ${{ inputs.config }}"
        PACKAGE="${{ inputs.package }}"
        VERSION="${{ steps.version.outputs.value }}"
        PR_NUMBER="${{ steps.pr.outputs.number }}"

        if grep -rlq "kind:" .changes/ 2>/dev/null \
            | xargs -r grep -l "release" \
            | xargs -r grep -l "project: $PACKAGE" \
            | xargs -r grep -lq "Release $PACKAGE $VERSION"; then
          echo "::notice::Release fragment for $PACKAGE $VERSION already exists, skipping"
        else
          $HERALD $CONFIG new \
            --project "$PACKAGE" \
            --kind release \
            --description "Release $PACKAGE $VERSION" \
            --pr "$PR_NUMBER"
        fi

        git add .changes/
        git diff --cached --quiet || \
          git commit --no-verify --no-gpg-sign \
            -m "Add release changelog fragment for $PACKAGE $VERSION"
        git push --force origin "$RELEASE_BRANCH"

    - name: Update PR body
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        PACKAGE="${{ inputs.package }}"
        VERSION="${{ steps.version.outputs.value }}"
        DEFAULT_BRANCH="${{ steps.default-branch.outputs.name }}"
        TAG="$RELEASE_TAG"
        BRANCH="$RELEASE_BRANCH"
        PR_NUMBER="${{ steps.pr.outputs.number }}"
        ACTOR="${GITHUB_ACTOR:-}"
        REPO_URL="https://github.com/${{ github.repository }}"
        COMMIT_COUNT=$(git rev-list --count "origin/${DEFAULT_BRANCH}..HEAD")
        CONFIG="${{ inputs.config }}"
        CABAL_FILE=$(yq -r ".projects.\"${PACKAGE}\".\"cabal-file\" // \"\"" "$CONFIG")

        SUBDIR_ARG=""
        if [ -n "$CABAL_FILE" ]; then
          SUBDIR=$(dirname "$CABAL_FILE")
          if [ "$SUBDIR" != "." ]; then
            SUBDIR_ARG=" $SUBDIR"
          fi
        fi

        if [ -n "$ACTOR" ]; then
          printf 'Triggered by @%s\n\n' "$ACTOR" > /tmp/pr-body.md
        else
          : > /tmp/pr-body.md
        fi

        cat >> /tmp/pr-body.md <<EOF
        ## Summary

        - Batch changelog fragments for \`$PACKAGE\` into version \`$VERSION\`
        - Update changelog file with a new release section
        - Bump \`.cabal\` version to \`$VERSION\`
        - Remove consumed changelog fragments
        - Add release changelog fragment for the next cycle

        ## Before merging

        ### Step 1: Sign the release

        The commits in this PR are **unsigned** and the tag has not been created yet. Run on a clean working tree:

        \`\`\`bash
        git fetch origin $BRANCH
        git checkout -B $BRANCH origin/$BRANCH
        git rebase HEAD~${COMMIT_COUNT} --exec 'git commit --amend --no-edit -S'
        git tag -s $TAG HEAD~$((COMMIT_COUNT - 1))  # batch commit, one before HEAD
        git push --force origin $BRANCH
        git push origin $TAG
        \`\`\`
        EOF

        if [ "${{ inputs.chap-instructions }}" = "true" ] && [ -n "$CABAL_FILE" ]; then
          cat >> /tmp/pr-body.md <<'CHAP'

        ### Step 2: Submit to CHaP

        Requires: signed tag pushed to remote (step 1 complete), [gh](https://cli.github.com/) installed and authenticated.

        Run in your [cardano-haskell-packages](https://github.com/intersectmbo/cardano-haskell-packages) checkout:

        ```bash
        set -euo pipefail
        git fetch origin
        git checkout -b __TAG__ origin/main
        TAG_SHA=$(git ls-remote __REPO__ refs/tags/__TAG__ | cut -f1)
        ./scripts/add-from-github.sh __REPO__ "$TAG_SHA"__SUBDIR__
        git push -u origin __TAG__
        CHAP_PR=$(gh pr create --repo intersectmbo/cardano-haskell-packages \
          --head __TAG__ \
          --title "Add __TAG__" \
          --body "From __REPO__ tag __TAG__")
        echo ">> CHaP PR: $CHAP_PR"
        gh pr comment __PR_NUMBER__ --repo __GH_REPO__ \
          --body "- $CHAP_PR"
        ```
        CHAP
          sed -i "s|__TAG__|$TAG|g; s|__REPO__|$REPO_URL|g; s|__SUBDIR__|$SUBDIR_ARG|g; s|__PR_NUMBER__|$PR_NUMBER|g; s|__GH_REPO__|${{ github.repository }}|g" /tmp/pr-body.md
        fi

        cat >> /tmp/pr-body.md <<EOF

        Generated with [herald](https://github.com/input-output-hk/cardano-dev)
        EOF
        sed -i 's/^        //' /tmp/pr-body.md
        gh pr edit "$PR_NUMBER" --body-file /tmp/pr-body.md

        echo "::notice::Release $PACKAGE $VERSION - PR: ${{ steps.pr.outputs.url }}"
